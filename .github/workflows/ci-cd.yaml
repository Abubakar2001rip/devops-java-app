name: Java CI/CD

on:
  push:
    branches:
      main

  pull_request:
    branches:
      main


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3


      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'


      - name: Build Jar
        run: mvn clean pacakge


      - name: Build Docker image
        WORKDIR: DEVOPS-JAVA-APP
        run: docker 
