apiVersion: apps/v1
kind: Deployment
metadata:
    name: java-app
    namespace: java-app
    labels:
      app: java-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-app
  template:
    metadata:
      labels:
        app: java-app
    spec:
      containers:
        - name: java-app
          image: abubakar2001rip/devops-java-app:latest
          ports:
            - containerPort: 8080

